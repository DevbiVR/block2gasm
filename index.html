<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blockly2GASM</title>

<script src="https://unpkg.com/blockly/blockly.min.js"></script>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: #1e1e24;
    color: #f4f4f6;
    padding: 16px;
    display: flex;
    flex-direction: column;
}

.header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #343a40;
    padding-bottom: 10px;
    margin-bottom: 12px;
    flex-shrink: 0;
}

h1 {
    margin: 0;
    color: #4dadf7;
}

h2 {
    margin: 0 0 10px 0;
    font-size: 1.1rem;
    color: #a5d8ff;
}

.header-buttons {
    display: flex;
    gap: 8px;
}

button {
    cursor: pointer;
    font-weight: bold;
}

.ghost-btn {
    background: transparent;
    color: #a5d8ff;
    border: 1px solid #4a4b59;
    padding: 8px 14px;
    border-radius: 6px;
}

.ghost-btn:hover {
    background: #343a40;
}

.config-panel {
    background: #2a2b36;
    border: 1px solid #3e4053;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    flex-shrink: 0;
}

.config-note {
    font-size: 0.75rem;
    color: #8a8d99;
    margin-bottom: 10px;
}

.config-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.ref-type-btn {
    background: #4dadf7;
    color: #121214;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
}

.ref-type-btn:hover {
    background: #339af0;
    color: white;
}

.ref-type-btn:disabled {
    background: #4a4b59;
    color: #8a8d99;
    cursor: not-allowed;
}

.ref-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
}

.ref-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #343a40;
    border: 1px solid #4a4b59;
    border-radius: 20px;
    padding: 6px 8px 6px 14px;
    font-size: 0.85rem;
}

.ref-chip button {
    background: none;
    border: none;
    color: #ff8787;
    font-size: 1rem;
}

.reg-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.reg-grid label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    color: #a5d8ff;
    font-weight: bold;
    font-size: 0.8rem;
}

.reg-grid input {
    background: #121214;
    color: #e3e6e8;
    border: 1px solid #4a4b59;
    border-radius: 4px;
    padding: 6px 8px;
}

.container {
    display: flex;
    gap: 14px;
    flex: 1;
    min-height: 0;
}

.panel {
    display: flex;
    flex-direction: column;
    background: #2a2b36;
    border-radius: 8px;
    padding: 12px;
    border: 1px solid #3e4053;
    min-height: 0;
}

#left-panel {
    flex: 2;
}

#right-panel {
    flex: 1;
}

#blocklyDiv {
    width: 100%;
    flex: 1;
    min-height: 0;
    border: 1px solid #4a4b59;
    border-radius: 4px;
    background: white;
}

textarea {
    width: 100%;
    flex: 1;
    min-height: 0;
    background: #121214;
    color: #e3e6e8;
    border: 1px solid #4a4b59;
    border-radius: 4px;
    padding: 12px;
    font-family: "Courier New", monospace;
    line-height: 1.4;
    resize: none;
    font-size: 0.95rem;
}

.actions {
    margin-top: 10px;
    text-align: right;
}

.primary {
    background: #4dadf7;
    color: #121214;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
}

.primary:hover {
    background: #339af0;
    color: white;
}
</style>
</head>

<body>

<div class="header-row">
    <h1>Blockly2GASM</h1>

    <div class="header-buttons">
        <button id="toggleRefs" class="ghost-btn">
            🔗 Configure References
        </button>

        <button id="toggleRegs" class="ghost-btn">
            ⚙ Configure Registers
        </button>
    </div>
</div>

<div id="regPanel" class="config-panel" style="display:none;">
    <div class="config-note">
        Give R0–R7 friendly names. Generated GASM still uses R0–R7.
    </div>

    <div id="regGrid" class="reg-grid"></div>
</div>

<div id="refPanel" class="config-panel" style="display:none;">
    <div class="config-note">
        Add references here. Only one Player reference can exist.
    </div>

    <div class="config-buttons">
        <button class="ref-type-btn" data-type="Object">
            + Object
        </button>

        <button class="ref-type-btn" data-type="Trigger">
            + Trigger
        </button>

        <button class="ref-type-btn" data-type="Sign">
            + Sign
        </button>

        <button class="ref-type-btn" data-type="Player">
            + Player
        </button>
    </div>

    <div id="refList" class="ref-list"></div>
</div>

<div class="container">

    <div id="left-panel" class="panel">
        <h2>Blocks</h2>
        <div id="blocklyDiv"></div>
    </div>

    <div id="right-panel" class="panel">
        <h2>Compiled GASM Code</h2>

        <textarea
            id="output"
            readonly
            placeholder="Drag blocks into the workspace..."
        ></textarea>

        <div class="actions">
            <button id="copyButton" class="primary">
                📋 Copy Code
            </button>
        </div>
    </div>

</div>

<xml id="toolbox" style="display:none">

    <category name="Values" colour="260">
        <block type="gasm_constant"></block>
        <block type="gasm_register"></block>
        <block type="gasm_special"></block>
    </category>

    <category name="Calculations" colour="120">
        <block type="gasm_set"></block>
        <block type="gasm_swap"></block>
        <block type="gasm_add"></block>
        <block type="gasm_sub"></block>
        <block type="gasm_mul"></block>
        <block type="gasm_div"></block>
        <block type="gasm_mod"></block>
        <block type="gasm_floor"></block>
        <block type="gasm_sqrt"></block>
        <block type="gasm_sin"></block>
        <block type="gasm_cos"></block>
        <block type="gasm_atan2"></block>
        <block type="gasm_equal"></block>
        <block type="gasm_less"></block>
        <block type="gasm_greater"></block>
        <block type="gasm_and"></block>
        <block type="gasm_or"></block>
        <block type="gasm_not"></block>
        <block type="gasm_rand"></block>
        <block type="gasm_sleep"></block>
        <block type="gasm_vec_set"></block>
        <block type="gasm_vec_add"></block>
        <block type="gasm_vec_sub"></block>
        <block type="gasm_vec_mul"></block>
        <block type="gasm_vec_scl"></block>
        <block type="gasm_vec_len"></block>
        <block type="gasm_vec_dot"></block>
    </category>

    <category id="objectCategory" name="Object" colour="160" hidden="true">
        <block type="gasm_object_reference"></block>
    </category>

    <category id="triggerCategory" name="Trigger" colour="20" hidden="true">
        <block type="gasm_trigger_reference"></block>
    </category>

    <category id="signCategory" name="Sign" colour="330" hidden="true">
        <block type="gasm_sign_reference"></block>
    </category>

    <category id="playerCategory" name="Player" colour="230" hidden="true">
        <block type="gasm_player_reference"></block>
    </category>

    <category name="Control Flow" colour="290">
        <block type="gasm_label"></block>
        <block type="gasm_goto"></block>
        <block type="gasm_if"></block>
        <block type="gasm_end"></block>
    </category>

    <category name="Misc" colour="330">
        <block type="gasm_comment"></block>
        <block type="gasm_raw"></block>
    </category>

</xml>

<script>

const REGISTERS = [

    "R4",
    "R5",
    "R6",
    "R7"

const registerNames = {};

REGISTERS.forEach(reg => {
    registerNames[reg] = "";
});

const references = [];

const referencePrefixes = {
    Object: "obj",
    Trigger: "trg",
    Sign: "sgn"

function getFieldsForType(type) {

    return REFERENCE_FIELDS[type] || [];

}

function getFieldDefinition(type, value) {

    return getFieldsForType(type).find(field => {

        return field.value === value;

    });

}

function getReferencesOfType(type) {

    return references.filter(reference => {

        return reference.type === type;

    });

}

function getReferenceDropdown(type) {

    const matching =
        getReferencesOfType(type);

    if (matching.length === 0) {

        return [
            [
                "No reference",
                "__NONE__"
            ]
        ];

    }

    return matching.map(reference => {

        return [
            reference.name,
            reference.name
        ];

    });

}

function getFieldDropdown(type) {

    const fields =
        getFieldsForType(type);

    if (fields.length === 0) {

        return [
            [
                "No field",
                "__NONE__"
            ]
        ];

    }

    return fields.map(field => {

        return [
            field.label,
            field.value
        ];

    });

}

function getRegisterOptions() {

    return REGISTERS.map(reg => {

        const name =
            registerNames[reg];

        return [
            name
                ? `${reg} · ${name}`
                : reg,
            reg
        ];

    });

}

const gasmGenerator =
    new Blockly.CodeGenerator("GASM");

gasmGenerator.ORDER_ATOMIC = 0;
gasmGenerator.ORDER_NONE = 99;

gasmGenerator.scrub_ =
function(block, code, thisOnly) {

    const next =
        block.getNextBlock();

    if (thisOnly) {

        return code;

    }

    return code +
        gasmGenerator.blockToCode(next);

};

Blockly.Blocks["gasm_constant"] = {

    init: function() {

        this.appendDummyInput()
            .appendField("CONSTANT")
            .appendField(
                new Blockly.FieldTextInput("0"),
                "VALUE"
            );

        this.setOutput(true, null);
        this.setColour(COLORS.VALUES);

    }

};

gasmGenerator.forBlock["gasm_constant"] =
function(block) {

    const value =
        block.getFieldValue("VALUE").trim();

    const valid =
        /^-?(?:\d+|\d*\.\d+)$/.test(value);

    if (!valid) {

        block.setWarningText(
            "Constants can only contain one number."
        );

        return [
            "0",
            gasmGenerator.ORDER_ATOMIC
        ];

    }

    block.setWarningText(null);

    return [
        value,
        gasmGenerator.ORDER_ATOMIC
    ];

};

Blockly.Blocks["gasm_register"] = {

    init: function() {

        this.appendDummyInput()
            .appendField(
                new Blockly.FieldDropdown(
                    getRegisterOptions
                ),
                "REG"
            );

        this.setOutput(true, null);
        this.setColour(COLORS.VALUES);

    }

};

gasmGenerator.forBlock["gasm_register"] =
function(block) {

    return [
        block.getFieldValue("REG"),
        gasmGenerator.ORDER_ATOMIC
    ];

};

Blockly.Blocks["gasm_special"] = {

    init: function() {

        this.appendDummyInput()
            .appendField(
                new Blockly.FieldDropdown([

                    [

                    ],

                    ],

                    [

                        "Halt"

        this.setColour(COLORS.VALUES);

    }

};

gasmGenerator.forBlock["gasm_special"] =
function(block) {

    return [
        block.getFieldValue("SPECIAL"),
        gasmGenerator.ORDER_ATOMIC
    ];

};

function getReferenceBlockType(type) {

    return `gasm_${type.toLowerCase()}_reference`;

}

function getReferenceTypeFromBlock(block) {

    const types = {

        gasm_object_reference:
            "Object",

        gasm_trigger_reference:
            "Trigger",

        gasm_sign_reference:
            "Sign",

        gasm_player_reference:
            "Player"

    };

    return types[block.type] || null;

}

function createReferenceBlock(type) {

    const blockType =
        getReferenceBlockType(type);

    Blockly.Blocks[blockType] = {

        init: function() {

            this.appendDummyInput("REFERENCE")
                .appendField(
                    new Blockly.FieldDropdown(
                        () => getReferenceDropdown(type)
                    ),
                    "REFERENCE"
                );

            this.appendDummyInput("FIELD")
                .appendField(
                    new Blockly.FieldDropdown(
                        () => getFieldDropdown(type)
                    ),
                    "FIELD"
                );

            this.setOutput(true, null);

            this.setColour(
                COLORS[type.toUpperCase()]
            );

        }

    };

    gasmGenerator.forBlock[blockType] =
    function(block) {

        const referenceName =
            block.getFieldValue("REFERENCE");

        const fieldName =
            block.getFieldValue("FIELD");

        if (referenceName === "__NONE__") {

            block.setWarningText(
                "No reference is selected."
            );

            return [
                "0",
                gasmGenerator.ORDER_ATOMIC
            ];

        }

        if (fieldName === "__NONE__") {

            block.setWarningText(
                "No field is selected."
            );

            return [
                "0",
                gasmGenerator.ORDER_ATOMIC
            ];

        }

        const reference =
            references.find(reference => {

                return reference.name === referenceName &&
                    reference.type === type;

            });

        if (!reference) {

            block.setWarningText(
                "This reference no longer exists."
            );

            return [
                "0",
                gasmGenerator.ORDER_ATOMIC
            ];

        }

        const field =
            getFieldDefinition(
                type,
                fieldName
            );

        if (!field) {

            block.setWarningText(
                "This field does not exist."
            );

            return [
                "0",
                gasmGenerator.ORDER_ATOMIC
            ];

        }

        const parent =
            block.getParent();

        if (!parent) {

            block.setWarningText(
                "Raw references will corrupt your code when pasted."
            );

            return [
                `${reference.name}.${field.value}`,
                gasmGenerator.ORDER_ATOMIC
            ];

        }

        const inputName =
            getInputNameContainingBlock(
                parent,
                block
            );

        const warning =
            validateReferenceUsage(
                type,
                field,
                parent,
                inputName
            );

        block.setWarningText(
            warning || null
        );

        return [
            `${reference.name}.${field.value}`,
            gasmGenerator.ORDER_ATOMIC
        ];

    };

}

createReferenceBlock("Object");
createReferenceBlock("Trigger");
createReferenceBlock("Sign");
createReferenceBlock("Player");

function getInputNameContainingBlock(parent, child) {

    for (const input of parent.inputList) {

        if (
            input.connection &&
            input.connection.targetBlock() === child
        ) {

            return input.name;

        }

    }

    return null;

}

    },

    {
        op: "AND",
        args: ["DST", "A", "B"]
    },

    {
        op: "OR",
        args: ["DST", "A", "B"]
    },

    {
        op: "NOT",
        args: ["DST", "A"]
    },

    {
        op: "RAND",
        args: ["DST", "N"]
    },

    {
        op: "SLEEP",
        args: ["MS"]
    },

    {
        op: "VEC_SET",
        args: ["DST", "SRC"]
    },

    {
        op: "VEC_ADD",
        args: ["DST", "A", "B"]
    },

    {
        op: "VEC_SUB",
        args: ["DST", "A", "B"]
    },

    {
        op: "VEC_MUL",
        args: ["DST", "A", "B"]
    },

    {
        op: "VEC_SCL",
        args: ["DST", "A", "S"]
    },

    {
        op: "VEC_LEN",
        args: ["DST", "A"]
    },

    {
        op: "VEC_DOT",
        args: ["DST", "A", "B"]
    }

];

function getInstructionDefinition(block) {

    return INSTRUCTIONS.find(def => {

        return block.type ===
            `gasm_${def.op.toLowerCase()}`;

    });

}

function getRequiredAccess(parent, inputName) {

    if (!parent || !inputName) {

        return null;

    }

    const instruction =
        getInstructionDefinition(parent);

    if (!instruction) {

        return null;

    }

    if (
        !instruction.args.includes(inputName)
    ) {

        return null;

    }

    if (
        inputName === "DST"
    ) {

        return "write";

    }

    return "read";

}

function validateReferenceUsage(
    type,
    field,
    parent,
    inputName
) {

    if (!field) {

        return "This field does not exist.";

    }

    if (!parent) {

        return "Raw references will corrupt your code when pasted.";

    }

    const requiredAccess =
        getRequiredAccess(
            parent,
            inputName
        );

    if (!requiredAccess) {

        return null;

    }

    const actualAccess =
        field.access;

    if (
        requiredAccess === "read" &&
        actualAccess === "write"
    ) {

        return `${type} reference field "${field.label}" is write-only and cannot be read in this context.`;

    }

    if (
        requiredAccess === "write" &&
        actualAccess === "read"
    ) {

        return `${type} reference field "${field.label}" is read-only and cannot be written in this context.`;

    }

    return null;

}

INSTRUCTIONS.forEach(def => {

    const type =
        `gasm_${def.op.toLowerCase()}`;

    Blockly.Blocks[type] = {

        init: function() {

            this.appendDummyInput()
                .appendField(def.op);

            def.args.forEach(arg => {

                this.appendValueInput(arg)
                    .appendField(arg);

            });

            this.setInputsInline(true);

            this.setPreviousStatement(
                true,
                null
            );

            this.setNextStatement(
                true,
                null
            );

            this.setColour(
                COLORS.CALCULATIONS
            );

        }

    };

    gasmGenerator.forBlock[type] =
    function(block) {

        const values =
            def.args.map(arg => {

                return gasmGenerator.valueToCode(
                    block,
                    arg,
                    gasmGenerator.ORDER_ATOMIC
                ) || "0";

            });

        return `${def.op} ${values.join(" ")}\n`;

    };

});

Blockly.Blocks["gasm_label"] = {

    init: function() {

        this.appendDummyInput()
            .appendField("LABEL")
            .appendField(
                new Blockly.FieldTextInput("Loop"),

            );

        this.setPreviousStatement(true, null);
        this.setNextStatement(true, null);
        this.setColour(COLORS.CONTROL);

    }

};

gasmGenerator.forBlock["gasm_label"] =
function(block) {

    return `LABEL ${block.getFieldValue("NAME")}\n`;

};

function(block) {

};

Blockly.Blocks["gasm_comment"] = {

Blockly.Blocks["gasm_raw"] = {

    init: function() {

        this.appendDummyInput()
            .appendField("RAW")

gasmGenerator.forBlock["gasm_raw"] =
function(block) {

    return `${block.getFieldValue("CODE")}\n`;

};

const workspace =
    Blockly.inject(
        "blocklyDiv",
        {

            toolbox:
                document.getElementById(
                    "toolbox"
                ),

            grid: {

                spacing: 20,
                length: 3,
                colour: "#ccc",
                snap: true

            },

            trashcan: true,

            zoom: {

                controls: true,
                wheel: true,
                startScale: 1,
                maxScale: 3,
                minScale: 0.3,
                scaleSpeed: 1.2

            }

        }
    );

function updateReferenceCategories() {

    const toolbox =
        document.getElementById(
            "toolbox"
        );

    const categoryIds = {

        Object:
            "objectCategory",

        Trigger:
            "triggerCategory",

        Sign:
            "signCategory",

        Player:
            "playerCategory"

    };

    Object.keys(categoryIds).forEach(type => {

        const category =
            toolbox.querySelector(
                `#${categoryIds[type]}`
            );

        if (!category) {

            return;

        }

        const exists =
            references.some(reference => {

                return reference.type === type;

            });

        category.setAttribute(
            "hidden",
            exists
                ? "false"
                : "true"
        );

    });

    workspace.updateToolbox(
        toolbox
    );

    refreshReferenceDropdowns();

}

function refreshReferenceDropdowns() {

    workspace
        .getAllBlocks(false)
        .forEach(block => {

            const type =
                getReferenceTypeFromBlock(
                    block
                );

            if (!type) {

                return;

            }

            const referenceField =
                block.getField(
                    "REFERENCE"
                );

            const fieldField =
                block.getField(
                    "FIELD"
                );

            if (referenceField) {

                const options =
                    getReferenceDropdown(
                        type
                    );

                referenceField.setOptions(
                    options
                );

                const current =
                    referenceField.getValue();

                const valid =
                    options.some(option => {

                        return option[1] === current;

                    });

                if (!valid) {

                    referenceField.setValue(
                        options[0][1]
                    );

                }

            }

            if (fieldField) {

                const options =
                    getFieldDropdown(
                        type
                    );

                fieldField.setOptions(
                    options
                );

                const current =
                    fieldField.getValue();

                const valid =
                    options.some(option => {

                        return option[1] === current;

                    });

                if (!valid) {

                    fieldField.setValue(
                        options[0][1]
                    );

                }

            }

        });

}

function validateBlocks() {

    workspace
        .getAllBlocks(false)
        .forEach(block => {

            if (
                block.type ===
                "gasm_constant"
            ) {

                const value =
                    block.getFieldValue(
                        "VALUE"
                    ).trim();

                const valid =
                    /^-?(?:\d+|\d*\.\d+)$/
                        .test(value);

                block.setWarningText(
                    valid
                        ? null
                        : "Constants can only contain one number."
                );

                return;

            }

            const type =
                getReferenceTypeFromBlock(
                    block
                );

            if (!type) {

                return;

            }

            const referenceName =
                block.getFieldValue(
                    "REFERENCE"
                );

            const fieldName =
                block.getFieldValue(
                    "FIELD"
                );

            if (
                referenceName === "__NONE__"
            ) {

                block.setWarningText(
                    "No reference is selected."
                );

                return;

            }

            if (
                fieldName === "__NONE__"
            ) {

                block.setWarningText(
                    "No field is selected."
                );

                return;

            }

            const reference =
                references.find(reference => {

                    return reference.name === referenceName &&
                        reference.type === type;

                });

            if (!reference) {

                block.setWarningText(
                    "This reference no longer exists."
                );

                return;

            }

            const field =
                getFieldDefinition(
                    type,
                    fieldName
                );

            if (!field) {

                block.setWarningText(
                    "This field does not exist."
                );

                return;

            }

            const parent =
                block.getParent();

            if (!parent) {

                block.setWarningText(
                    "Raw references will corrupt your code when pasted."
                );

                return;

            }

            const inputName =
                getInputNameContainingBlock(
                    parent,
                    block
                );

            const warning =
                validateReferenceUsage(
                    type,
                    field,
                    parent,
                    inputName
                );

            block.setWarningText(
                warning || null
            );

        });

}

function updateOutput() {

    validateBlocks();

    const code =
        gasmGenerator.workspaceToCode(
            workspace
        );

    document
        .getElementById(
            "output"
        )
        .value =
        code.trim();

}

workspace.addChangeListener(
    updateOutput
);

const regGrid =
    document.getElementById(
        "regGrid"
    );

REGISTERS.forEach(reg => {

    const label =
        document.createElement(
            "label"
        );

    label.textContent =
        reg;

    const input =
        document.createElement(
            "input"
        );

    input.placeholder =
        "e.g. Speed";

    input.addEventListener(
        "input",
        event => {

            registerNames[reg] =
                event.target.value.trim();

            workspace
                .getAllBlocks(false)
                .forEach(block => {

                    const field =
                        block.getField(
                            "REG"
                        );

                    if (field) {

                        field.forceRerender();

                    }

                });

        }
    );

    label.appendChild(input);
    regGrid.appendChild(label);

});

document
    .getElementById(
        "toggleRegs"
    )
    .addEventListener(
        "click",
        () => {

            const panel =
                document.getElementById(
                    "regPanel"
                );

            panel.style.display =
                panel.style.display === "none"
                    ? "block"
                    : "none";

        }
    );

const refList =
    document.getElementById(
        "refList"
    );

function renderReferences() {

    refList.innerHTML = "";

    references.forEach(reference => {

        const chip =
            document.createElement(
                "div"
            );

        chip.className =
            "ref-chip";

        const label =
            document.createElement(
                "span"
            );

        label.textContent =
            `${reference.name} (${reference.type})`;

        const remove =
            document.createElement(
                "button"
            );

        remove.textContent =
            "×";

        remove.addEventListener(
            "click",
            () => {

                const index =
                    references.indexOf(
                        reference
                    );

                if (index !== -1) {

                    references.splice(
                        index,
                        1
                    );

                }

                renderReferences();
                updateReferenceCategories();
                updateOutput();

            }
        );

        chip.appendChild(label);
        chip.appendChild(remove);

        refList.appendChild(chip);

    });

    const playerButton =
        document.querySelector(
            '[data-type="Player"]'
        );

    playerButton.disabled =
        references.some(reference => {

            return reference.type === "Player";

        });

}

function addReference(type) {

    if (type === "Player") {

        if (
            references.some(reference => {

                return reference.type === "Player";

            })
        ) {

            return;

        }

        references.push({

            name: "Player",
            type: "Player"

        });

    } else {

        const prefix =
            referencePrefixes[type];

        let number = 1;

        while (
            references.some(reference => {

                return reference.name ===
                    `${prefix}${number}`;

            })
        ) {

            number++;

        }

        references.push({

            name:
                `${prefix}${number}`,

            type

        });

    }

    renderReferences();
    updateReferenceCategories();
    updateOutput();

}

document
    .querySelectorAll(
        ".ref-type-btn"
    )
    .forEach(button => {

        button.addEventListener(
            "click",
            () => {

                addReference(
                    button.dataset.type
                );

            }
        );

    });

document
    .getElementById(
        "toggleRefs"
    )
    .addEventListener(
        "click",
        () => {

            const panel =
                document.getElementById(
                    "refPanel"
                );

            panel.style.display =
                panel.style.display === "none"
                    ? "block"
                    : "none";

        }
    );

document
    .getElementById(
        "copyButton"
    )
    .addEventListener(
        "click",
        async () => {

            const output =
                document.getElementById(
                    "output"
                );

            if (!output.value) {

                return;

            }

            await navigator
                .clipboard
                .writeText(
                    output.value
                );

            const button =
                document.getElementById(
                    "copyButton"
                );

            const oldText =
                button.textContent;

            button.textContent =
                "✅ Copied!";

            setTimeout(
                () => {

                    button.textContent =
                        oldText;

                },
                1500
            );

        }
    );

renderReferences();

updateReferenceCategories();

updateOutput();

</script>
