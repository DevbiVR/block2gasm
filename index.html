<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blockly2GASM</title>
    <!-- Load Google Blockly Scripts -->
    <script src="https://unpkg.com"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1e1e24; color: #f4f4f6; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        h1 { margin-top: 0; color: #4dadf7; border-bottom: 2px solid #343a40; padding-bottom: 10px; margin-bottom: 15px; }
        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .panel { display: flex; flex-direction: column; background: #2a2b36; border-radius: 8px; padding: 15px; border: 1px solid #3e4053; }
        #left-panel { flex: 2; }
        #right-panel { flex: 1; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #a5d8ff; }
        #blocklyDiv { width: 100%; flex: 1; border: 1px solid #4a4b59; border-radius: 4px; background: #121214; }
        textarea { width: 100%; flex: 1; background: #121214; color: #e3e6e8; border: 1px solid #4a4b59; border-radius: 4px; padding: 12px; font-family: 'Courier New', Courier, monospace; line-height: 1.4; resize: none; font-size: 1rem; }
        .actions { margin-top: 15px; text-align: right; }
        button { background: #4dadf7; color: #121214; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #339af0; color: white; }
    </style>
</head>
<body>

    <h1>⚡ Blockly2GASM</h1>
    
    <div class="container">
        <!-- Left Panel: The Visual Drag-and-Drop Editor -->
        <div id="left-panel" class="panel">
            <h2>🧩 Logic Block Workspace</h2>
            <div id="blocklyDiv"></div>
        </div>
        
        <!-- Right Panel: The Output Code Area -->
        <div id="right-panel" class="panel">
            <h2>📜 Compiled GASM Code</h2>
            <textarea id="output" readonly placeholder="Drag some blocks to generate code..."></textarea>
            <div class="actions">
                <button onclick="copyToClipboard()">📋 Copy Code</button>
            </div>
        </div>
    </div>

    <!-- Define the Blockly Toolbox (The Sidebar of Blocks) -->
    <xml id="toolbox" style="display: none">
        <category name="Variables" colour="#ffd43b">
            <block type="gasm_register_set"></block>
            <block type="gasm_register_get"></block>
        </category>
        <category name="Math" colour="#37b24d">
            <block type="math_number"></block>
            <block type="gasm_math_op"></block>
        </category>
    </xml>

    <script>
        // --- 1. DEFINE CUSTOM BLOCKS FOR GASM ---
        Blockly.Blocks['gasm_register_set'] = {
            init: function() {
                this.appendValueInput("VALUE")
                    .setCheck("Number")
                    .appendField("SET")
                    .appendField(new Blockly.FieldDropdown([["R0","R0"], ["R1","R1"], ["R2","R2"], ["R3","R3"], ["R4","R4"], ["R5","R5"], ["R6","R6"], ["R7","R7"]]), "REG")
                    .appendField("TO");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#ffd43b");
            }
        };

        Blockly.Blocks['gasm_register_get'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField(new Blockly.FieldDropdown([["R0","R0"], ["R1","R1"], ["R2","R2"], ["R3","R3"], ["R4","R4"], ["R5","R5"], ["R6","R6"], ["R7","R7"]]), "REG");
                this.setOutput(true, "Number");
                this.setColour("#ffd43b");
            }
        };

        Blockly.Blocks['gasm_math_op'] = {
            init: function() {
                this.appendValueInput("A").setCheck("Number");
                this.appendValueInput("B").setCheck("Number")
                    .appendField(new Blockly.FieldDropdown([["+","ADD"], ["-","SUB"], ["*","MUL"], ["/","DIV"]]), "OP");
                this.setOutput(true, "Number");
                this.setInputsInline(true);
                this.setColour("#37b24d");
            }
        };

        // --- 2. CREATE THE TRANSPILER GENERATOR ---
        const gasmGenerator = new Blockly.Generator('GASM');
        gasmGenerator.ORDER_ATOMIC = 0;
        gasmGenerator.ORDER_NONE = 99;

        gasmGenerator['gasm_register_set'] = function(block) {
            const reg = block.getFieldValue('REG');
            const valueCode = gasmGenerator.valueToCode(block, 'VALUE', gasmGenerator.ORDER_NONE) || '0.0';
            
            if (valueCode.startsWith('ADD') || valueCode.startsWith('SUB') || valueCode.startsWith('MUL') || valueCode.startsWith('DIV')) {
                return `${valueCode.replace('TARGET', reg)}\n`;
            }
            return `SET ${reg} ${valueCode}\n`;
        };

        gasmGenerator['gasm_register_get'] = function(block) {
            const reg = block.getFieldValue('REG');
            return [reg, gasmGenerator.ORDER_ATOMIC];
        };

        gasmGenerator['math_number'] = function(block) {
            const number = parseFloat(block.getFieldValue('NUM')).toFixed(1);
            return [number, gasmGenerator.ORDER_ATOMIC];
        };

        gasmGenerator['gasm_math_op'] = function(block) {
            const op = block.getFieldValue('OP');
            const valA = gasmGenerator.valueToCode(block, 'A', gasmGenerator.ORDER_ATOMIC) || '0.0';
            const valB = gasmGenerator.valueToCode(block, 'B', gasmGenerator.ORDER_ATOMIC) || '0.0';
            return [`${op} TARGET ${valA} ${valB}`, gasmGenerator.ORDER_ATOMIC];
        };

        gasmGenerator.scrub_ = function(block, code, thisOnly) {
            const nextBlock = block.getNextBlock();
            const nextCode = thisOnly ? '' : gasmGenerator.blockToCode(nextBlock);
            return code + nextCode;
        };

        // --- 3. INITIALIZE WORKSPACE & AUTOMATION ---
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            theme: 'dark',
            grid: { spacing: 20, length: 3, colour: '#3e4053', snap: true },
            trashcan: true
        });

        function updateOutput() {
            const code = gasmGenerator.workspaceToCode(workspace);
            document.getElementById('output').value = code.trim();
        }
        workspace.addChangeListener(updateOutput);

        function copyToClipboard() {
            const outputBox = document.getElementById('output');
            if (!outputBox.value) return;
            outputBox.select();
            navigator.clipboard.writeText(outputBox.value);
            const btn = document.querySelector('.actions button');
            const orig = btn.innerText;
            btn.innerText = "✅ Copied!";
            setTimeout(() => btn.innerText = orig, 1500);
        }
    </script>
</body>
</html>
